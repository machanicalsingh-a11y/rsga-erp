  .sub { color:#64748b; font-size:13px; margin-bottom:24px; }

  .btn { display:inline-flex; align-items:center; gap:6px; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-size:14px; font-weight:700; font-family:inherit; transition:all .15s; }
  .btn-primary { background:#1F3864; color:#fff; width:100%; justify-content:center; padding:13px; font-size:15px; }
  .btn-primary:hover { background:#2E75B6; }
  .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
  .progress-wrap { background:#e2e8f0; border-radius:20px; height:12px; margin:12px 0; overflow:hidden; }
  .progress-bar { background:linear-gradient(90deg,#1F3864,#2E75B6); height:100%; border-radius:20px; transition:width .3s; }
  .log { background:#0f172a; color:#94a3b8; border-radius:8px; padding:14px; font-size:12px; font-family:'Courier New',monospace; max-height:200px; overflow-y:auto; margin-top:12px; }
  .log-ok  { color:#4ade80; }
  .log-err { color:#f87171; }
  .log-info { color:#60a5fa; }
  .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:12px 0; }
  .stat { background:#f8fafc; border-radius:8px; padding:10px; text-align:center; }
  .stat-n { font-size:24px; font-weight:900; color:#1F3864; }
  .stat-l { font-size:11px; color:#64748b; margin-top:2px; }
  select, input { width:100%; padding:9px 12px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:13px; margin-top:6px; font-family:inherit; outline:none; }
  select:focus, input:focus { border-color:#2E75B6; }
  label { font-size:12px; font-weight:700; color:#475569; }
</style>

function addLog(msg, type='') {
  const log = document.getElementById('log');
  log.style.display = 'block';
  const d = document.createElement('div');
  d.className = type ? 'log-'+type : '';
  d.textContent = msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

window.startImport = async function() {
  const btn = document.getElementById('import-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Importing...';

  const filterClass = document.getElementById('filter-class').value;
  let students = filterClass
    ? ALL_STUDENTS.filter(s => s.class === filterClass)
    : ALL_STUDENTS;

  document.getElementById('total-count').textContent = students.length;
  addLog(`Starting import of ${students.length} students...`, 'info');

  // Check existing students to avoid duplicates
  addLog('Checking existing data...', 'info');
  const existing = new Set();
  const snap = await getDocs(collection(db, 'students'));
  snap.forEach(d => {
    const data = d.data();
    if (data.srNo) existing.add(data.srNo);
  });
  addLog(`${existing.size} students already in database`, 'info');

  let uploaded = 0, failed = 0, skipped = 0;
  const batch = 5; // upload 5 at a time

  for (let i = 0; i < students.length; i += batch) {
    const chunk = students.slice(i, i + batch);

    await Promise.all(chunk.map(async s => {
      // Skip if already exists
      if (s.srNo && existing.has(s.srNo)) {
        skipped++;
        return;
      }
      try {
        await addDoc(collection(db, 'students'), {
          ...s,
          createdAt: serverTimestamp()
        });
        uploaded++;
      } catch(e) {
        failed++;
        addLog(`❌ ${s.name}: ${e.message}`, 'err');
      }
    }));

    // Update UI
    const progress = Math.round(((i + chunk.length) / students.length) * 100);
    document.getElementById('progress-bar').style.width = progress + '%';
    document.getElementById('uploaded-count').textContent = uploaded;
    document.getElementById('failed-count').textContent = failed;
    document.getElementById('progress-text').textContent =
      `${i + chunk.length} / ${students.length} processed (${skipped} skipped)`;

    if (i % 50 === 0 && i > 0) {
      addLog(`✅ ${uploaded} uploaded, ${skipped} skipped, ${failed} failed`, 'ok');
    }

    await sleep(100); // small delay to avoid rate limiting
  }

  addLog(`🎉 Import complete! ${uploaded} students added, ${skipped} skipped, ${failed} failed`, 'ok');
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = `✅ Done! ${uploaded} students imported!`;
  btn.textContent = '✅ Import Complete!';
  btn.style.background = '#16a34a';
};
</script>
